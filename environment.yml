name: nfcc
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy
  - pandas
  - scipy

  # Geospatial
  - gdal
  - rasterio
  - geopandas
  - shapely
  - fiona
  - pyproj
  - xarray
  - rioxarray

  # ML
  - scikit-learn
  - xgboost

  # Visualization
  - matplotlib
  - plotly
  - streamlit
  - folium

  # API
  - fastapi
  - uvicorn

  - pip
  - pip:
      - shap
      - python-dotenv
      - tqdm
      - click
      - pyyaml
