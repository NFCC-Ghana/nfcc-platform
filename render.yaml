services:
  - type: web
    name: nfcc-platform
    env: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALERT_DRY_RUN
        value: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_RECIPIENTS
        sync: false
