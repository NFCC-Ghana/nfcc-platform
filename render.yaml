services:
  - type: web
    name: civicflood-ai-dashboard
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements_streamlit.txt
    startCommand: |
      cd /opt/render/project/src
      streamlit run hackathon/app/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: NFCC_API_URL
        value: https://nfcc-platform-production.up.railway.app
      - key: PYTHON_VERSION
        value: 3.10.20
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/hackathon
