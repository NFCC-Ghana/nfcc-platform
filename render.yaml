services:
  - type: web
    name: civicflood-ai-dashboard
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements_dashboard.txt
    startCommand: |
      streamlit run hackathon/app/pages_disabled/dashboard_v4.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: NFCC_API_URL
        value: https://nfcc-platform-production.up.railway.app
      - key: PYTHON_VERSION
        value: 3.10.20
    healthCheckPath: /_stcore/health
