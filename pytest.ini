[pytest]
# Test discovery settings
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_api: marks tests that require API server
    requires_twilio: marks tests that require Twilio credentials
    requires_db: marks tests that require database

# Output settings
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=5

# Coverage settings (if pytest-cov is installed)
# --cov=src --cov-report=term --cov-report=html

# Asyncio mode (if using async tests)
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
